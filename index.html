<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solitario 2048</title>
    <link rel="icon" type="image/png" href="logo2048.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="game-container">
        <header class="game-header">
            <div class="current-score" id="score">0</div>
            <button id="btn-reset" class="btn-reset">Reiniciar</button>
        </header>

        <section class="board" id="board">
            <div class="column" data-col="0"></div>
            <div class="column" data-col="1"></div>
            <div class="column" data-col="2"></div>
            <div class="column" data-col="3"></div>
        </section>

        <footer class="deck-area">
            <div class="cards-deck">
                <div id="current-card-container">
                    <div class="card card-8"></div> 
                </div>
            </div>
            <button id="btn-discard" class="discard-box">
                <div class="card card-discard" data-discards="0"></div>
            </button>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
